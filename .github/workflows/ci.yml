name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: xifty-node-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/XIFtyNode
    steps:
      - name: Check out binding repo
        uses: actions/checkout@v5
        with:
          path: XIFtyNode

      - name: Check out core repo
        uses: actions/checkout@v5
        with:
          repository: XIFtySense/XIFty
          path: XIFty

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            XIFty -> target

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: XIFtyNode/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build addon
        env:
          XIFTY_CORE_DIR: ${{ github.workspace }}/XIFty
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Run example
        run: npm run example
